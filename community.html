<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Our Community — Recover Cann</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
  <main class="education-container" role="region" aria-label="Our Community">
    <img src="assets/RC-logo.png" alt="Recover Cann logo" class="logo">
    <h1>Our Community</h1>
    <p class="sub">Connect with our veteran community</p>

    <div class="edu-grid">
      <a class="edu-card" href="newsletters.html">
        <span class="edu-icon"><i class="fa-regular fa-newspaper"></i></span>
        <div class="edu-title">Newsletters</div>
      </a>

      <a class="edu-card" href="testimonials.html">
        <span class="edu-icon"><i class="fa-solid fa-comments"></i></span>
        <div class="edu-title">Testimonials</div>
      </a>

      <div class="edu-card edu-card--coming-soon">
        <span class="edu-icon"><i class="fa-regular fa-clock"></i></span>
        <div class="edu-title">More Coming Soon</div>
        <div class="edu-sub">Have a suggestion? <a class="coming-soon-link" id="community-suggest-link" href="#">Email Patient Support</a></div>
      </div>
    </div>
  </main>

  <a class="floating-back" href="index.html" aria-label="Back to home">Home <i class="fa-solid fa-house"></i></a>
  <script>
    document.getElementById('community-suggest-link').addEventListener('click', function(e) {
      e.preventDefault();
      var email = 'support1' + '@' + 'recovercann.ca';
      window.location.href = 'mailto:' + email;
    });
  </script>
</body>
</html>
